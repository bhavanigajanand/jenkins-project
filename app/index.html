<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jenkins CI/CD Project</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            text-align: center;
            padding: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
        }

        h1 {
            color: #38bdf8;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            margin: 8px 0;
        }

        .badge {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 15px;
            background: #22c55e;
            border-radius: 8px;
            font-weight: bold;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>🚀 Jenkins CI/CD Pipeline</h1>
        <p>Welcome! This app is deployed using Docker + Jenkins.</p>
        <p>Every commit triggers an automated build & deployment.</p>

        <div class="badge">Deployment Successful ✔</div>

        <div class="footer">
            DevOps Project • Terraform + Docker + Jenkins
        </div>
    </div>
</body>
</html>

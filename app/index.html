<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jenkins CI/CD Project</title>
    <style>
        body {
            margin: 0;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', monospace;
        }

        .terminal {
            color: #00ff00;
            font-size: 18px;
            line-height: 2;
            white-space: pre;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background: #00ff00;
            animation: blink 0.8s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="terminal" id="terminal"></div>

    <script>
        const lines = [
            "$ whoami",
            "  Bhavani Gajanand",
            "",
            "$ cat project.txt",
            "  Project  : Jenkins CI/CD Pipeline",
            "  Status   : Deployment Successful ✔",
            "",
            "$ cat tools.txt",
            "  - Terraform   (Infrastructure)",
            "  - Jenkins     (CI/CD Pipeline)",
            "  - Docker      (Containerization)",
            "  - DockerHub   (Image Registry)",
            "  - AWS EC2     (Cloud Server)",
            "  - GitHub      (Source Control)",
            "",
            "$ echo 'Every git push auto deploys the app!'",
            "  Every git push auto deploys the app!",
            "",
            "$ status",
            "  App is LIVE at http://3.90.25.106 ✔",
        ];

        const terminal = document.getElementById('terminal');
        let lineIndex = 0;
        let charIndex = 0;
        let output = '';

        function type() {
            if (lineIndex >= lines.length) {
                terminal.innerHTML = output + '<span class="cursor"></span>';
                return;
            }

            const currentLine = lines[lineIndex];

            if (charIndex < currentLine.length) {
                output += currentLine[charIndex];
                charIndex++;
                terminal.innerHTML = output + '<span class="cursor"></span>';
                setTimeout(type, 40);
            } else {
                output += '\n';
                lineIndex++;
                charIndex = 0;
                terminal.innerHTML = output + '<span class="cursor"></span>';
                setTimeout(type, 200);
            }
        }

        type();
    </script>
</body>
</html>
